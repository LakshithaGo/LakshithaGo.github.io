<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lakshitha G | Portfolio</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #000;
            color: white;
            font-family: 'Arial', sans-serif;
            overflow: hidden;
        }

        /* --- INTRO SCREEN --- */
        #intro-screen {
            position: fixed;
            width: 100%;
            height: 100vh;
            background-color: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
        }

        .netflix-logo {
            color: #E50914;
            font-family: 'Bebas Neue', cursive;
            font-size: 8rem;
            letter-spacing: 5px;
            
            /* THIS IS THE MAGIC: It applies the curve filter defined below */
            filter: url(#curve-filter);
            
            animation: netflix-intro 3s forwards;
            text-shadow: 0 0 20px rgba(229, 9, 20, 0.4);
        }

        @keyframes netflix-intro {
            0% { transform: scale(0.8); opacity: 0; }
            20% { opacity: 1; }
            80% { transform: scale(1.1); opacity: 1; }
            100% { transform: scale(1.3); opacity: 0; }
        }

        /* --- CONTENT --- */
        #main-content {
            display: none;
            background-color: #141414;
            min-height: 100vh;
            padding: 50px;
        }
    </style>
</head>
<body>

    <svg width="0" height="0">
        <filter id="curve-filter">
            <feDisplacementMap in="SourceGraphic" scale="30">
                <feFuncP type="table" tableValues="0 0.2 0.5 0.2 0"/>
            </feDisplacementMap>
            <feTurbulence type="fractalNoise" baseFrequency="0.01" num
