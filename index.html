<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lakshitha G | Portfolio</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #000;
            color: white;
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            overflow: hidden;
        }

        /* --- THE INTRO SCREEN --- */
        #intro-screen {
            position: fixed;
            width: 100%;
            height: 100vh;
            background-color: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
        }

        .netflix-logo {
            color: #E50914;
            font-family: 'Bebas Neue', cursive;
            font-size: 8rem;
            letter-spacing: 6px;
            text-transform: uppercase;
            
            /* --- THE CURVE TRICK --- */
            /* We tilt the text and use a shadow to 'fake' the depth */
            transform: perspective(500px) rotateX(20deg) scale(0.8);
            display: inline-block;
            padding: 20px;
            
            /* This cuts the bottom into a curve that is 100% browser-safe */
            clip-path: ellipse(110% 100% at 50% 0%);
            
            animation: netflix-zoom 3s forwards;
            text-shadow: 0px 10px 20px rgba(229, 9, 20, 0.5);
        }

        @keyframes netflix-zoom {
            0% { transform: perspective(500px) rotateX(20deg) scale(0.6); opacity: 0; }
            20% { opacity: 1; }
            80% { transform: perspective(500px) rotateX(20deg) scale(1.1); opacity: 1; }
            100% { transform: perspective(500px) rotateX(20deg) scale(1.4); opacity: 0; }
        }

        /* --- THE WEBSITE CONTENT --- */
        #main-content {
            display: none;
            background-color: #141414;
            min-height: 100vh;
            padding: 40px;
        }

        .netflix-header {
            color: #E50914;
            font-family: 'Bebas Neue';
            font-size: 3rem;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>

    <div id="intro-screen">
        <h1 class="netflix-logo">Lakshitha G</h1>
    </div>

    <div id="main-content">
        <h1 class="netflix-header">PORTFOLIO-FLIX</h1>
        <p>Success! Your intro is now live and stable.</p>
        
        <h2 style="font-size: 1.5rem; text-align: left; margin-left: 20px;">Trending Now: My Projects</h2>
        <div style="height: 200px; width: 300px; background: #333; margin: 20px; border-radius: 4px; display: flex; align-items: center; justify-content: center;">
            <p>Project Card Goes Here</p>
        </div>
    </div>

    <script>
        // This ensures the screen switches after 3 seconds
        setTimeout(function() {
            document.getElementById('intro-screen').style.display = 'none';
            document.getElementById('main-content').style.display = 'block';
            document.body.style.overflow = 'auto';
        }, 3000);
    </script>

</body>
</html>
