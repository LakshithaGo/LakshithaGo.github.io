<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Netflix Portfolio</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #141414; /* Netflix Dark Background */
            color: white;
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            overflow: hidden; /* Prevents scrolling during the intro */
        }

        /* --- INTRO SCREEN STYLING --- */
        #intro-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            background-color: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
        }
            .netflix-logo {
            color: #E50914;
            font-family: 'Bebas Neue', cursive;
            font-size: 8rem;
            letter-spacing: 4px;
            position: relative;
            
            /* This creates the curved bottom effect */
            display: inline-block;
            padding-bottom: 20px;
            clip-path: ellipse(120% 100% at 50% 0%);
            
            /* Adds a slight 3D shadow like the original logo */
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
            
            animation: netflix-intro 3s forwards;
        }

        @keyframes netflix-intro {
            0% { transform: scale(0.6); opacity: 0; }
            20% { opacity: 1; }
            80% { transform: scale(1.1); opacity: 1; }
            100% { transform: scale(1.4); opacity: 0; }
        }

        /* --- MAIN WEBSITE CONTENT (Hidden at first) --- */
        #main-content {
            display: none;
            padding: 50px;
            text-align: center;
        }
    </style>
</head>
<body>

    <div id="intro-screen">
        <h1 class="netflix-logo">Lakshitha G</h1>
    </div>

    <div id="main-content">
        <h1>Welcome to the Show</h1>
        <p>This is where your projects will appear after the animation.</p>
    </div>

    <script>
        setTimeout(function() {
            document.getElementById('intro-screen').style.display = 'none';
            document.getElementById('main-content').style.display = 'block';
            document.body.style.overflow = 'auto'; // Re-enable scrolling
        }, 3000);
    </script>

</body>
</html>
