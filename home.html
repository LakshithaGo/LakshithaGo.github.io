<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Who's Watching? | Portfolio-Flix</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #141414;
            color: white;
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        .profile-container {
            text-align: center;
            animation: fadeIn 1.5s ease-in;
        }

        h1 {
            font-size: 3.5vw;
            font-weight: 500;
            letter-spacing: 1px;
            margin-bottom: 2rem;
        }

        .profile-list {
            display: flex;
            gap: 2vw;
            justify-content: center;
            list-style: none;
            padding: 0;
        }

        .profile-card {
            text-decoration: none;
            color: #808080; /* Gray text until hover */
            transition: color 0.3s;
        }

        .profile-card:hover {
            color: white;
        }

        .icon-box {
            width: 10vw;
            height: 10vw;
            min-width: 100px;
            min-height: 100px;
            border-radius: 4px;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 15px;
            position: relative;
            transition: border 0.2s ease-in-out;
        }

        .profile-card:hover .icon-box {
            border: 3px solid white;
        }

        /* --- Iconic Netflix Colors --- */
        .blue { background-color: #1d82e6; }
        .red { background-color: #e50914; }
        .green { background-color: #3f9e4d; }
        .plus-box { background-color: transparent; border: none; }

        /* Smiley Face Styling */
        .smiley {
            font-size: 5vw;
            color: rgba(255, 255, 255, 0.9);
        }

        .plus-icon {
            font-size: 6vw;
            color: #808080;
            transition: transform 0.2s;
        }

        .profile-card:hover .plus-icon {
            color: white;
            transform: scale(1.1);
        }

        .profile-name {
            font-size: 1.3vw;
            display: block;
        }

        /* Bottom Button */
        .manage-button {
            margin-top: 4rem;
            background: transparent;
            border: 1px solid #808080;
            color: #808080;
            padding: 10px 30px;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-size: 1.1vw;
            cursor: pointer;
            transition: all 0.3s;
        }

        .manage-button:hover {
            border-color: white;
            color: white;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="profile-container">
        <h1>Who's watching?</h1>
        
        <div class="profile-list">
            <a href="aboutme.html" class="profile-card">
                <div class="icon-box blue">
                    <i class="fas fa-smile smiley"></i>
                </div>
                <span class="profile-name">About Me</span>
            </a>

            <a href="experience.html" class="profile-card">
                <div class="icon-box red">
                    <i class="fas fa-smile smiley"></i>
                </div>
                <span class="profile-name">Experience</span>
            </a>

            <a href="projects.html" class="profile-card">
                <div class="icon-box green">
                    <i class="fas fa-smile smiley"></i>
                </div>
                <span class="profile-name">Projects</span>
            </a>

            <a href="YOUR_LINKEDIN_URL_HERE" class="profile-card">
                <div class="icon-box plus-box">
                    <i class="fas fa-circle-plus plus-icon"></i>
                </div>
                <span class="profile-name">Add Me!</span>
            </a>
        </div>

        <button class="manage-button">Incoming Work</button>
    </div>

</body>
</html>
