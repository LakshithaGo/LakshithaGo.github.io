<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Who's Watching? | Portfolio-Flix</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #141414;
            color: white;
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        .profile-container {
            text-align: center;
            animation: fadeIn 1.2s ease-in;
        }

        h1 {
            font-size: 3.5rem;
            font-weight: 500;
            letter-spacing: 1px;
            margin-bottom: 2.5rem;
        }

        .profile-list {
            display: flex;
            gap: 25px;
            justify-content: center;
            list-style: none;
            padding: 0;
        }

        .profile-card {
            text-decoration: none;
            color: #808080;
            transition: color 0.3s;
            width: 160px; /* Standardized width for PC browsers */
        }

        .profile-card:hover {
            color: white;
        }

        .icon-box {
            width: 160px;
            height: 160px;
            border-radius: 4px;
            overflow: hidden; /* Keeps the images inside the square */
            margin-bottom: 15px;
            position: relative;
            box-sizing: border-box;
            border: 3px solid transparent;
            transition: border 0.1s ease-in;
        }

        /* Hover effect exactly like Netflix */
        .profile-card:hover .icon-box {
            border: 3px solid white;
        }

        .avatar-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .plus-box {
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: transparent;
        }

        .plus-icon {
            font-size: 5rem;
            color: #808080;
            transition: all 0.2s;
        }

        .profile-card:hover .plus-icon {
            color: white;
            transform: scale(1.05);
        }

        .profile-name {
            font-size: 1.2rem;
            display: block;
            margin-top: 10px;
        }

        /* Bottom Button Style */
        .manage-button {
            margin-top: 5rem;
            background: transparent;
            border: 1px solid #808080;
            color: #808080;
            padding: 12px 35px;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s;
        }

        .manage-button:hover {
            border-color: white;
            color: white;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(1.05); }
            to { opacity: 1; transform: scale(1); }
        }
    </style>
</head>
<body>

    <div class="profile-container">
        <h1>Who's watching?</h1>
        
        <div class="profile-list">
            <a href="aboutme.html" class="profile-card">
                <div class="icon-box">
                    <img src="https://i.pinimg.com/564x/1b/a2/e6/1ba2e6d1d4874546c70c91f1024e17fb.jpg" alt="About Me" class="avatar-img">
                </div>
                <span class="profile-name">About Me</span>
            </a>

            <a href="experience.html" class="profile-card">
                <div class="icon-box">
                    <img src="https://i.pinimg.com/474x/61/54/76/61547625e01d8daf941aae3ffb37f653.jpg" alt="Experience" class="avatar-img">
                </div>
                <span class="profile-name">Experience</span>
            </a>

            <a href="projects.html" class="profile-card">
                <div class="icon-box">
                    <img src="https://wallpapers.com/images/hd/netflix-profile-pictures-1000-x-1000-88wkdmjrorckekha.jpg" alt="Projects" class="avatar-img">
                </div>
                <span class="profile-name">Projects</span>
            </a>

            <a href="https://linkedin.com/in/YOUR_PROFILE" class="profile-card" target="_blank">
                <div class="icon-box plus-box">
                    <i class="fas fa-plus-circle plus-icon"></i>
                </div>
                <span class="profile-name">Add Me!</span>
            </a>
        </div>

        <button class="manage-button">Incoming Work</button>
    </div>

</body>
</html>
