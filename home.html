<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Who's Watching? | Portfolio-Flix</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #141414;
            color: white;
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh; /* Changed from height to min-height for mobile scrolling */
            overflow: hidden;
        }

        .profile-container {
            text-align: center;
            animation: fadeIn 1.2s ease-in;
            padding: 20px;
        }

        h1 {
            font-size: 3.5rem;
            font-weight: 500;
            letter-spacing: 1px;
            margin-bottom: 2.5rem;
        }

        .profile-list {
            display: flex;
            gap: 25px;
            justify-content: center;
            list-style: none;
            padding: 0;
            flex-wrap: wrap; /* THIS IS KEY: Allows boxes to drop to the next line on mobile */
        }

        .profile-card {
            text-decoration: none;
            color: #808080;
            transition: color 0.3s;
            width: 160px; 
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .profile-card:hover {
            color: white;
        }

        .icon-box {
            width: 160px;
            height: 160px;
            border-radius: 4px;
            overflow: hidden; 
            margin-bottom: 15px;
            position: relative;
            box-sizing: border-box;
            border: 3px solid transparent;
            transition: border 0.1s ease-in;
        }

        .profile-card:hover .icon-box {
            border: 3px solid white;
        }

        .avatar-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .plus-box {
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: transparent;
        }

        .plus-icon {
            font-size: 5rem;
            color: #808080;
            transition: all 0.2s;
        }

        .profile-card:hover .plus-icon {
            color: white;
            transform: scale(1.05);
        }

        .profile-name {
            font-size: 1.2rem;
            display: block;
            margin-top: 10px;
        }

        .manage-button {
            margin-top: 7rem;
            background: transparent;
            border: 1px solid #808080;
            color: #808080;
            padding: 12px 35px;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s;
        }

        .manage-button:hover {
            background-color: rgba(255,255,255,0.7);
            color: white;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(1.05); }
            to { opacity: 1; transform: scale(1); }
        }

        /* --- MOBILE OPTIMIZATION --- */
        @media (max-width: 600px) {
            body {
                overflow-y: auto; /* Lets the user scroll if the screen is very short */
                align-items: flex-start; /* Pushes content up so it doesn't get cut off */
                padding-top: 40px;
            }

            h1 {
                font-size: 2.2rem; /* Shrinks the title */
                margin-bottom: 2rem;
            }

            .profile-list {
                gap: 15px; /* Brings boxes slightly closer together */
            }

            .profile-card {
                width: 120px; /* Shrinks the card width */
            }

            .icon-box {
                width: 120px; /* Shrinks the image box */
                height: 120px;
            }

            .plus-icon {
                font-size: 3.5rem; /* Shrinks the plus icon */
            }

            .profile-name {
                font-size: 1rem;
            }

            .manage-button {
                margin-top: 3rem;
                padding: 10px 25px;
                font-size: 0.85rem;
            }
        }
    </style>
</head>
<body>

    <div class="profile-container">
        <h1>Who's watching?</h1>
        
        <div class="profile-list">
            <a href="aboutme.html" class="profile-card">
                <div class="icon-box">
                    <img src="https://wallpapers.com/images/high/netflix-profile-pictures-5yup5hd2i60x7ew3.webp" alt="About Me" class="avatar-img">
                </div>
                <span class="profile-name">About Me</span>
            </a>

            <a href="experience.html" class="profile-card">
                <div class="icon-box">
                    <img src="https://wallpapers.com/images/high/netflix-profile-pictures-1000-x-1000-qo9h82134t9nv0j0.webp" alt="Experience" class="avatar-img">
                </div>
                <span class="profile-name">Experience</span>
            </a>

            <a href="projects.html" class="profile-card">
                <div class="icon-box">
                    <img src="https://wallpapers.com/images/high/netflix-profile-pictures-1000-x-1000-dyrp6bw6adbulg5b.webp" alt="Projects" class="avatar-img">
                </div>
                <span class="profile-name">Projects</span>
            </a>

            <a href="https://linkedin.com/in/YOUR_PROFILE" class="profile-card" target="_blank">
                <div class="icon-box plus-box">
                    <i class="fas fa-plus-circle plus-icon"></i>
                </div>
                <span class="profile-name">Add Me!</span>
            </a>
        </div>
        
        <a href="hireme.html" class="manage-button">Subscribe!</a>
        
    </div>

</body>
</html>
