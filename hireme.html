<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hire Me | Portfolio-Flix</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #141414;
            color: white;
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* --- NAVBAR & BACK BUTTON --- */
        .navbar {
            position: fixed;
            top: 0;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: space-between; 
            padding: 20px 5%; 
            background-color: #141414; 
            border-bottom: 1px solid #333;
            z-index: 1000;
            box-sizing: border-box;
        }

        .nav-left { display: flex; align-items: center; gap: 45px; }

        .back-btn {
            color: white;
            font-size: 1.5rem;
            text-decoration: none;
            transition: transform 0.2s;
        }

        .back-btn:hover { transform: scale(1.1); }

        .logo { 
            color: #B81D24; 
            font-size: 1.8rem; 
            font-weight: bold; 
            text-decoration: none; 
            letter-spacing: -1.5px; 
        }

        .nav-links { display: flex; gap: 25px; list-style: none; padding: 0; margin: 0; }
        .nav-links a { color: #e5e5e5; text-decoration: none; font-size: 0.9rem; transition: 0.3s; }
        .nav-links a:hover { color: #b3b3b3; }

        .profile-btn {
            width: 32px;
            height: 32px;
            border-radius: 4px;
            cursor: pointer;
            background: url('eye track.jpg') center/cover;
        }

        /* --- CONTACT FORM SECTION --- */
        .contact-container {
            flex-grow: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 120px 5% 50px;
        }

        .contact-card {
            background-color: rgba(0, 0, 0, 0.75);
            padding: 60px;
            border-radius: 4px;
            width: 100%;
            max-width: 450px;
            box-sizing: border-box;
        }

        .contact-card h1 { font-size: 2rem; margin-bottom: 28px; }

        .form-group { margin-bottom: 16px; }

        .form-input {
            width: 100%;
            padding: 16px 20px;
            background-color: #333;
            border: none;
            border-radius: 4px;
            color: white;
            font-size: 1rem;
            box-sizing: border-box;
            outline: none;
        }

        .form-input:focus { background-color: #454545; }

        textarea.form-input { height: 120px; resize: none; }

        .btn-submit {
            width: 100%;
            padding: 16px;
            background-color: #E50914;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            margin-top: 24px;
            transition: background-color 0.2s;
        }

        .btn-submit:hover { background-color: #ff0a16; }

        /* --- CAST & CREW CREDITS (FOOTER) --- */
        .credits-section {
            padding: 40px 5% 60px;
            background-color: #141414;
            border-top: 1px solid #333;
            text-align: center;
        }

        .credits-grid {
            display: flex;
            justify-content: center;
            gap: 60px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .credit-item { text-align: center; }
        .credit-label { color: #777; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 5px; }
        .credit-value a { color: #e5e5e5; text-decoration: none; font-size: 1.1rem; font-weight: 500; }
        .credit-value a:hover { text-decoration: underline; }

        .resume-btn {
            display: inline-block;
            margin-top: 20px;
            background-color: transparent;
            border: 1px solid #777;
            color: white;
            padding: 10px 25px;
            text-decoration: none;
            border-radius: 4px;
            font-size: 0.9rem;
            transition: 0.3s;
        }

        .resume-btn:hover { border-color: white; background-color: rgba(255,255,255,0.1); }

        /* --- MOBILE --- */
        @media (max-width: 768px) {
            .nav-links { display: none; }
            .contact-card { padding: 40px 20px; }
            .credits-grid { gap: 30px; }
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="nav-left">
            <a href="home.html" class="back-btn"><i class="fas fa-arrow-left"></i></a>
            <a href="index.html" class="logo">LAKSHITHA G</a>
            <ul class="nav-links">
                <li><a href="home.html">Home</a></li>
                <li><a href="aboutme.html">About Me</a></li>
                <li><a href="experience.html">Experience</a></li>
                <li><a href="projects.html">Projects</a></li>
                <li><a href="skills.html">Skills</a></li>
                <li><a href="3-1-2026-Lakshitha Govinda-Resume.pdf" target="_blank">Resume</a></li>
                <li><a href="hireme.html" style="font-weight:bold; color:white;">Hire Me</a></li>
            </ul>
        </div>
        <a href="home.html" class="profile-btn"></a>
    </nav>

    <main class="contact-container">
        <div class="contact-card">
            <h1>Start Your Subscription</h1>
            <form action="https://formsubmit.co/lakshithagovinda@gmail.com" method="POST">
                <input type="hidden" name="_captcha" value="false">
                <input type="hidden" name="_next" value="https://yourportfolio.com/thanks.html">
                
                <div class="form-group">
                    <input type="text" name="name" class="form-input" placeholder="Full Name" required>
                </div>
                <div class="form-group">
                    <input type="email" name="email" class="form-input" placeholder="Email Address" required>
                </div>
                <div class="form-group">
                    <input type="text" name="subject" class="form-input" placeholder="Subject" required>
                </div>
                <div class="form-group">
                    <textarea name="message" class="form-input" placeholder="How can we collaborate?"></textarea>
                </div>
                <button type="submit" class="btn-submit">Subscribe to Me</button>
            </form>
        </div>
    </main>

    <footer class="credits-section">
        <div class="credits-grid">
            <div class="credit-item">
                <div class="credit-label">Cast</div>
                <div class="credit-value"><a href="https://www.linkedin.com/in/lakshitha-g-747b64224/" target="_blank">LinkedIn Profile</a></div>
            </div>
            <div class="credit-item">
                <div class="credit-label">Crew</div>
                <div class="credit-value"><a href="mailto:lakshithagovinda@email.com">Lakshitha Govinda</a></div>
            </div>
        </div>
        
        <a href="3-1-2026-Lakshitha Govinda-Resume.pdf" class="resume-btn" target="_blank">
            <i class="fas fa-file-download"></i> Download Full Resume
        </a>
        
        <p style="margin-top: 40px; font-size: 0.75rem; color: #555;">© 2026 Portfolio-Flix Original Production</p>
    </footer>

    <script>

        });
    </script>

</body>
</html>
