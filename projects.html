    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #141414;
            color: white;
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            overflow-x: hidden;
        }

        /* --- NAVBAR --- */
        .navbar {
            position: fixed;
            top: 0;
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            /* Increased padding to prevent cutoff on wide screens */
            padding: 25px 5%; 
            background: linear-gradient(to bottom, rgba(0,0,0,0.9) 0%, transparent 100%);
            z-index: 1000;
            box-sizing: border-box;
        }

        .nav-left { display: flex; align-items: center; gap: 45px; }
        
        /* ## LOGO: Darker red and tight spacing ## */
        .logo { 
            color: #B81D24; 
            font-size: 1.8rem; 
            font-weight: bold; 
            text-decoration: none; 
            letter-spacing: -1.5px; 
        }

        .nav-links { display: flex; gap: 25px; list-style: none; padding: 0; margin: 0; }
        .nav-links a { color: #e5e5e5; text-decoration: none; font-size: 0.9rem; transition: 0.3s; }
        .nav-links a:hover { color: #b3b3b3; }

        .profile-btn {
            width: 32px;
            height: 32px;
            border-radius: 4px;
            cursor: pointer;
            background: url('eye track.jpg') center/cover; /* # EDIT PROFILE IMAGE # */
        }

        /* --- BANNER --- */
        .banner {
            height: 85vh;
            position: relative;
            background: url('moving gif.gif') center/cover; /* # EDIT BANNER IMAGE # */
            display: flex;
            align-items: center;
            padding: 0 5%; /* Aligned with Navbar */
            border-bottom: 10px solid #141414; 
        }

        .banner-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(to right, #141414 15%, transparent 80%);
        }

        .banner-content {
            position: relative;
            max-width: 700px;
            z-index: 10;
        }

        .banner-title { font-size: 4.5rem; margin: 0; }
        .banner-subtitle { font-size: 1.5rem; color: #E50914; margin: 10px 0 25px; font-weight: bold; }
        .banner-desc { font-size: 1.2rem; line-height: 1.5; margin-bottom: 30px; text-shadow: 2px 2px 5px rgba(0,0,0,0.8); }

        .btn-container { display: flex; gap: 20px; }
        .btn {
            padding: 12px 30px;
            border-radius: 4px;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            border: none;
            display: flex;
            align-items: center;
            gap: 12px;
            text-decoration: none;
        }
        .btn-resume { background-color: white; color: black; }
        .btn-linkedin { background-color: rgba(109, 109, 110, 0.8); color: white; }

/* --- PROJECT ROW --- */
        .row { 
            padding: 50px 5%; 
        } 
        
        .row-title { 
            font-size: 1.6rem; 
            font-weight: bold; 
            margin-bottom: 20px; 
        }
        
        /* ## PROJECT LIST: Controls the horizontal scroll ## */
        .project-list {
            display: flex;
            gap: 12px;
            overflow-x: auto;
            padding: 25px 0;
            /* Makes scrolling smooth and "snaps" to boxes on mobile */
            scroll-behavior: smooth;
            scroll-snap-type: x mandatory;
            -webkit-overflow-scrolling: touch; /* Extra smoothness for iPhones */
        }
        
        /* Hides the scrollbar while keeping the scroll function active */
        .project-list::-webkit-scrollbar { 
            display: none; 
        }

        /* ## PROJECT CARD: The actual movie boxes ## */
        .project-card {
            min-width: 300px;
            height: 170px;
            border-radius: 4px;
            transition: 0.4s transform ease;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            text-decoration: none;
            background-size: cover;
            background-position: center;
            scroll-snap-align: start; /* Helps mobile users land on a box perfectly */
            flex-shrink: 0; /* Prevents boxes from squishing */
        }

        /* Standard Netflix zoom on hover */
        .project-card:hover { 
            transform: scale(1.1); 
            z-index: 100; 
        }

        /* ## CARD OVERLAY: Contains your one-liner and skills ## */
        .card-overlay {
            position: absolute;
            bottom: 0; 
            width: 100%;
            padding: 20px 15px;
            background: linear-gradient(transparent, rgba(0,0,0,0.95));
            color: white;
            
            /* HIDDEN BY DEFAULT: This makes it pop up only on hover */
            opacity: 0;
            transition: opacity 0.3s ease;
            box-sizing: border-box;
        }

        /* Trigger for showing the text when mouse is over the box */
        .project-card:hover .card-overlay { 
            opacity: 1; 
        }

        /* --- SKILLS TAGS: Glow effect, no link cursor --- */
        .skills-container {
            display: flex;
            gap: 8px;
            margin-top: 10px;
            flex-wrap: wrap;
        }

        .skill-tag {
            background-color: #333;
            padding: 4px 10px;
            border-radius: 2px;
            font-size: 0.75rem;
            color: #ccc;
            cursor: default; 
            transition: all 0.3s ease;
        }

        .skill-tag:hover {
            color: white;
            box-shadow: 0 0 10px rgba(229, 9, 20, 0.6); 
            background-color: #E50914;
        }

        /* --- MOBILE OPTIMIZATION: Fixes the iPhone view --- */
        @media (max-width: 768px) {
            .row { 
                padding: 30px 5%; 
            }
            .row-title { 
                font-size: 1.3rem; 
            }
            /* Adjusts box size so they fit better on phone screens */
            .project-card { 
                min-width: 240px; 
                height: 140px; 
            }
            .footer {
                padding: 40px 5%;
            }
            .footer-links {
                grid-template-columns: repeat(2, 1fr); /* 2 columns on mobile instead of 3 */
            }
        }

        /* --- FOOTER: spread out like Netflix --- */
        .footer {
            padding: 70px 15% 40px; 
            color: #808080;
            border-top: 1px solid #333;
            margin-top: 50px;
        }

        .footer-links {
            display: grid;
            grid-template-columns: repeat(3, 1fr); 
            gap: 20px;
            list-style: none;
            padding: 0;
        }

        .footer-links a {
            color: #808080;
            text-decoration: none;
            font-size: 0.9rem;
        }

        .footer-links a:hover { 
            text-decoration: underline; 
        }

        /* ## PROJECT BOX IMAGES: Update your filenames here ## */
        .box-Interpreter\ Use { background-image: url('Impact of Consistent Interpreter.jpg'); }

        .box-Share\ My\ Meals { background-image: url('Share my Meals- A longitudinal Analysis.jpg'); }
        .box-other { background-image: url('Netflix_LoadTime.gif'); }
